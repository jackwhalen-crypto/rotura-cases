<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotura Case Study Queue</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;
  --border:#e0dfd8;--border2:#cccbc4;
  --red-bg:#fef2f2;--red-text:#b91c1c;--red-border:#fecaca;
  --yellow-bg:#fffbeb;--yellow-text:#92400e;--yellow-border:#fde68a;
  --green-bg:#f0fdf4;--green-text:#166534;--green-border:#bbf7d0;
  --blue-bg:#eff6ff;--blue-text:#1d4ed8;--blue-border:#bfdbfe;
  --purple-bg:#faf5ff;--purple-text:#6b21a8;--purple-border:#e9d5ff;
  --orange-bg:#fff7ed;--orange-text:#9a3412;--orange-border:#fed7aa;
  --radius:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c28;
    --text:#e8e8e0;--text2:#a0a09a;--text3:#606058;
    --border:#38382e;--border2:#4a4a40;
    --red-bg:#2d1515;--red-text:#fca5a5;--red-border:#7f1d1d;
    --yellow-bg:#2d2000;--yellow-text:#fcd34d;--yellow-border:#78350f;
    --green-bg:#0f2a18;--green-text:#86efac;--green-border:#14532d;
    --blue-bg:#0f1e3a;--blue-text:#93c5fd;--blue-border:#1e3a5f;
    --purple-bg:#1e0a2d;--purple-text:#d8b4fe;--purple-border:#4a1772;
    --orange-bg:#2d1500;--orange-text:#fdba74;--orange-border:#7c2d12;
  }
}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{max-width:960px;margin:0 auto;padding:24px 16px}
.header{margin-bottom:24px}
.header h1{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.header p{font-size:13px;color:var(--text2)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:22px;font-weight:600}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.spacer{flex:1}
.notion-link{font-size:12px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:5px;padding:5px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg)}
.queue{display:flex;flex-direction:column;gap:8px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer}
.card:hover{border-color:var(--border2)}
.card.open{border-color:var(--blue-border);border-width:1px}
.card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.card-num{font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0;padding-top:2px;min-width:52px}
.card-main{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.tag-red{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red-border)}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow-text);border:0.5px solid var(--yellow-border)}
.tag-blue{background:var(--blue-bg);color:var(--blue-text);border:0.5px solid var(--blue-border)}
.tag-orange{background:var(--orange-bg);color:var(--orange-text);border:0.5px solid var(--orange-border)}
.tag-purple{background:var(--purple-bg);color:var(--purple-text);border:0.5px solid var(--purple-border)}
.tag-gray{background:var(--bg2);color:var(--text2);border:0.5px solid var(--border)}
.card-meta{display:flex;gap:14px;font-size:12px;color:var(--text3)}
.card-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.status-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.st-unreviewed{background:var(--red-bg);color:var(--red-text)}
.st-inreview{background:var(--yellow-bg);color:var(--yellow-text)}
.st-complete{background:var(--green-bg);color:var(--green-text)}
.chevron{font-size:14px;color:var(--text3);transition:transform .2s}
.card.open .chevron{transform:rotate(180deg)}
.card-body{border-top:0.5px solid var(--border);padding:0}
.section{padding:14px 16px;border-bottom:0.5px solid var(--border)}
.section:last-child{border-bottom:none}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px}
/* Collapsible submission */
.submission-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:10px;font-size:12px;font-weight:500;color:var(--text2)}
.submission-toggle:hover{border-color:var(--border2)}
.submission-content{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;display:none;font-size:12px;line-height:1.6}
.submission-content.visible{display:block}
.sub-field{margin-bottom:12px}
.sub-field:last-child{margin-bottom:0}
.sub-field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:4px}
.sub-field-value{color:var(--text2);font-family:var(--mono);font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:8px 10px}
.sub-field-value.short{font-family:var(--font);font-size:12px;background:none;border:none;padding:0;max-height:none;overflow:visible}
.steps-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.step-item{background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow-y:auto;color:var(--text2)}
/* Timeline */
.timeline{display:flex;flex-direction:column}
.tl-row{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.r-nr{background:var(--red-bg);color:var(--red-text)}
.r-accept{background:var(--green-bg);color:var(--green-text)}
.r-reject{background:var(--orange-bg);color:var(--orange-text)}
.r-blank{background:var(--bg2);color:var(--text3)}
.tl-content{flex:1;min-width:0}
.tl-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tl-reviewer{font-size:12px;font-weight:500}
.tl-date{font-size:11px;color:var(--text3)}
.tl-summary{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:4px;font-style:italic}
.tl-verbatim-toggle{font-size:11px;color:var(--blue-text);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
.tl-verbatim{font-size:11px;color:var(--text2);line-height:1.5;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:7px 9px;margin-top:4px;display:none;white-space:pre-wrap}
.tl-verbatim.visible{display:block}
.tl-empty{font-size:11px;color:var(--text3);font-style:italic}
/* Diagnosis */
.diag-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.diag-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;background:transparent;user-select:none}
.diag-chip.on{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.assign-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.assign-row label{font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap}
.assign-row select{flex:1;font-size:12px;padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px}
.field textarea{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 11px;font-size:12px;font-family:var(--font);color:var(--text);resize:vertical;min-height:80px;line-height:1.5}
.field textarea:focus{outline:none;border-color:var(--border2)}
.field textarea::placeholder{color:var(--text3)}
.actions{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap;padding-top:12px;border-top:0.5px solid var(--border)}
.btn{font-size:12px;padding:7px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-blue{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.btn-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.save-msg{font-size:11px;color:var(--green-text)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.unavailable{font-size:12px;color:var(--text3);font-style:italic;padding:10px 0}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Rotura Case Study Queue</h1>
    <p>Review flagged submission histories, diagnose what went wrong, and draft coaching messages.</p>

  <div class="stats-row" id="stats"></div>
  <div class="toolbar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>

  <div class="queue" id="queue"></div>
</div>
<script>
const W2_ECS=['tc3397@columbia.edu','pteixeir@knox.edu','jabbarimoh611@gmail.com','meh.asghari0@gmail.com','aadityapaudel2@gmail.com'];
const DIAG_OPTS=['Solution not self-contained','Feedback not actionable','Inconsistent reviewer standards','Repeated same error sent back','Prompt/solution mismatch','Unnecessary rounds','Reviewers contradicting each other','LaTeX-only feedback missed math issues','Other'];

const CASES=[
{id:'cs001',caseId:'CS-001',title:'Excessive Computation / Prompt Drift',project:'Frontier',nrCount:10,totalReviews:11,uniqueReviewers:5,daysInFlight:5,flags:['Excessive Rounds','Contradictory Feedback'],
submission:{
  prompt:"Consider the lamina with density function $\\rho(x, y) = y + 32$ that occupies the union of bounded connected components of the complement of the trace of the parametric curve $x = t + 10\\pi \\sin(t/6)$, $y = 6 + 10\\pi \\cos(t/6)$, where $-11\\pi \\le t \\le 11\\pi$. What is the mass of the lamina?\n\nIn your computation of the answer, use the original parameter $t$ throughout; do not reparameterize the curve. Round all boundary-defining $t$-values to one decimal place and round the final answer to the nearest thousand.",
  domain:"Calculus — Integral calculus",
  answerType:"Numerical scalar approximation",
  problemType:"Numerical approximation",
  finalAnswer:"$152{,}000$",
  domainExplanation:"This problem involves calculating the mass of a lamina, which is part of integral calculus. The problem also involves a parametric equation, which is part of precalculus. However, the calculus is more advanced than the precalculus.",
  steps:["Step 1: The curve is a prolate trochoid. Because $10\\pi > 6$, the curve loops back on itself and creates several closed bounded regions. The mass is $M = \\iint_R (y+32)\\,dA$ where $R$ is the union of bounded regions.","Step 2: To find self-intersections, let $u = t/6$. Suppose two parameters $u$ and $v$ give the same point. Since $y(u) = 6 + 10\\pi\\cos u$, we need $\\cos u = \\cos v$, giving $v = -u + 2k\\pi$. Impose $x(u)=x(v)$: $3u + 5\\pi\\sin u = 3k\\pi$.","Step 3: For $k=1$: solutions $u = \\pi/6$ (i.e. $t \\approx 3.1$) and $u = 11\\pi/6$ (i.e. $t \\approx 34.6$). For $k=0$: Newton's method gives $\\alpha \\approx 4.02$ ($t \\approx 24.1$) and $\\beta \\approx 5.01$ ($t \\approx 30.1$). By symmetry the left-loop and central crossings are at $\\pm$ these values.","Step 4: The trace forms a connected planar graph with $V=4$ vertices and $E=7$ edges, giving $4$ bounded components by Euler's formula: two congruent side regions, one top middle region, one small central region. $M = 2M_{\\text{loop}} + M_{\\text{top}} - M_{\\text{small}}$.","Step 5: Green's theorem with $P = -(y^2/2 + 32y)$, $Q=0$ gives $\\iint(y+32)\\,dA = \\oint P\\,dx$. Since $dx/dt = y(t)/6$, define $K(t) = y(t)^3/12 + 16y(t)^2/3$. Then $P\\,dx = -K(t)\\,dt$.","Step 6: Each region's mass is a signed integral of $K(t)$ over the appropriate arc intervals.","Step 7: Numerically evaluate: $M_{\\text{loop}} \\approx 67{,}796$; $M_{\\text{top}} \\approx 21{,}622$; $M_{\\text{small}} \\approx 4{,}898$. Therefore $M \\approx 2(67{,}796) + 21{,}622 - 4{,}898 \\approx 152{,}316$. Rounded: $\\boxed{152{,}000}$."]
},
timeline:[
  {n:1,reviewer:'Reviewer A',result:'NR',date:'Jun 02',summary:"Too computational — Newton's method not acceptable. Intermediate rounding changes final answer.",verbatim:"Problems are not allowed to rely on programs/computer, so the value of α and β that was derived by \"you can use Newton's method with\" is not acceptable. Also, all the intermediate rounding can change the final answer, so that should be avoided, or at least provide a justification that it doesn't."},
  {n:2,reviewer:'Reviewer A',result:'NR',date:'Jun 03',summary:"Same issue — any problem requiring a computer cannot be accepted.",verbatim:"It's not about stumping the LLM or not, any problem that requires a computer or running a program cannot be accepted because it is deemed too computational, that's unfortunately part of the rules. Here, the computations of the coefficients and \"Now evaluate the three integrals numerically,\" violate this requirement."},
  {n:3,reviewer:'Reviewer B',result:'NR',date:'Jun 04',summary:"New issue: region definition unclear. Green's theorem integrals lack boundary orientation explanation.",verbatim:"Thanks for the submission. The prompt needs a clearer definition of the region. Since the curve is self intersecting and open, \"the union of all bounded regions enclosed by the curve\" is not precise enough. It should say exactly which bounded components are included, or define the region as the union of bounded connected components of the complement of the curve trace. The final answer format should also be tightened, such as nearest integer multiple of 1000. The final answer appears correct, but the solution is not fully checkable yet. It states the region decomposition without justifying it, and the Green's theorem integrals in Step 6 are given without a clear boundary orientation explanation. The numerical roots and integral values also need enough detail to reproduce them."},
  {n:4,reviewer:'Reviewer A',result:'NR',date:'Jun 05',summary:"Too computational (again) — two variables and integrals computed numerically.",verbatim:"A submission that requires a computer or running a program is considered too computational, any problem should be doable by hand in reasonable time. Here two variables and the integrals are computed numerically."},
  {n:5,reviewer:'Reviewer A',result:'NR',date:'Jun 05',summary:"Too computational (again).",verbatim:"In general problems need to be hand-solvable using a pen and a paper in a reasonable time, and any that require a computer cannot be accepted. Here two variables and the integrals are computed numerically."},
  {n:6,reviewer:'Reviewer A',result:'NR',date:'Jun 05',summary:"Anything requiring a computer is excluded unless you show calculations to rigorously establish an approximation.",verbatim:"The requirement is pretty straightforward: anything that requires a computer or running a program is excluded. Numerical evaluation for integrals / finding roots is thus excluded, except if you do show in the solution the calculations that allow you to rigorously establish an approximation."},
  {n:7,reviewer:'Reviewer C',result:'',date:'Jun 05',summary:'',verbatim:''},
  {n:8,reviewer:'Reviewer D',result:'NR',date:'Jun 05',summary:"Steps 1–6 reasonable but Step 7 requires numerical computation. Final answer M ≈ 3,041,361 cannot be reproduced by hand.",verbatim:"The analytical setup (Steps 1–6) is generally reasonable. However, Step 7 requires substantial numerical computation to evaluate multiple large definite integrals and obtain the final mass. The solution relies on numerically determined self intersection parameters (obtained via Newton's method in Step 3) and then uses those approximated values as integration limits in several nontrivial integrals. The final answer, M ≈ 3,041,361, cannot be reproduced by hand from the information provided and effectively requires numerical integration software or a computer algebra system. As written, the problem is primarily a computational exercise rather than a reasoning-based one."},
  {n:9,reviewer:'Reviewer E',result:'NR',date:'Jun 06',summary:"New issue: Exact Scalar answer type no longer accepted.",verbatim:"The final answer type is clearly Exact Scalar, which is no longer accepting submissions. Please revise the prompt so that a different answer type is meaningfully reached."},
  {n:10,reviewer:'Reviewer E',result:'NR',date:'Jun 06',summary:"New issue: solution violates prompt constraint by reparameterizing with u=t/6.",verbatim:"The problem explicitly requires \"use the original parameter t throughout; do not reparameterize the curve\" but the provided solution sets \"let u = t/6\", directly invalidating this requirement of the prompt. Also in Step 7, you are missing a \"\\\" on your \"\\,\" for M_{top}."},
  {n:11,reviewer:'Reviewer A',result:'NR',date:'Jun 07',summary:"Solution is clearly for a different problem than what the prompt describes.",verbatim:"The solution is clearly for another problem than the one written in the prompt."},
]},

{id:'cs002',caseId:'CS-002',title:'LaTeX Errors + Drifting Problem Statement',project:'Main',nrCount:10,totalReviews:14,uniqueReviewers:8,daysInFlight:7,flags:['Excessive Rounds','Multi-Reviewer','Contradictory Feedback'],
submission:{
  prompt:"Let $G$ be the abelian group with generators $x_1,x_2,x_3,x_4$ and relations encoded by the integer matrix $A=\\begin{bmatrix}6&10&14&22\\\\10&18&26&38\\\\14&26&42&58\\\\22&38&58&86\\end{bmatrix}$, where the rows give relations among the generators. Determine the invariant factor decomposition of $G=\\mathbb{Z}^4/\\operatorname{rowspan}_{\\mathbb{Z}}(A)$.",
  domain:"Abstract Algebra — Module theory",
  answerType:"Canonical form",
  problemType:"Canonicalization or normalization",
  finalAnswer:"$\\mathbb{Z} \\oplus \\mathbb{Z}/2\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z}$",
  domainExplanation:"This problem involves integer powers, cyclic sums, parity-based cancellation, and explicit constructions of integer tuple partitions, which are part of Number Theory. However, the main reasoning depends on Smith normal form and finitely generated modules over Z, so Abstract Algebra / Module theory is the most appropriate domain.",
  steps:["Step 1: The invariant factor decomposition is determined by the Smith normal form of $A$. If the nonzero Smith invariant factors are $d_1,d_2,d_3$ with $d_1|d_2|d_3$, then $G \\cong \\mathbb{Z}^{4-r} \\oplus \\mathbb{Z}/d_1\\mathbb{Z} \\oplus \\mathbb{Z}/d_2\\mathbb{Z} \\oplus \\mathbb{Z}/d_3\\mathbb{Z}$.","Step 2: $\\det(A)=0$ but the upper-left $3\\times3$ minor has determinant $32\\neq 0$. Therefore $\\operatorname{rank}(A)=3$, so $G$ has one free $\\mathbb{Z}$ summand.","Step 3: First determinantal divisor $\\Delta_1 = \\gcd(6,10,14,22,18,26,38,42,58,86) = 2$. Thus $d_1=2$.","Step 4: Second determinantal divisor $\\Delta_2 = \\gcd$ of all $2\\times2$ minors $= 8$. Therefore $d_1 d_2 = 8$, so $d_2=4$.","Step 5: Third determinantal divisor $\\Delta_3 = \\gcd$ of all $3\\times3$ minors $= 32$. Therefore $d_1 d_2 d_3 = 32$, so $d_3=4$.","Step 6: Smith normal form is $\\operatorname{diag}(2,4,4,0)$. Therefore $G \\cong \\mathbb{Z} \\oplus \\mathbb{Z}/2\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z}$. Final Answer: $\\boxed{\\mathbb{Z} \\oplus \\mathbb{Z}/2\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z} \\oplus \\mathbb{Z}/4\\mathbb{Z}}$"]
},
timeline:[
  {n:1,reviewer:'Reviewer A',result:'NR',date:'Apr 28',summary:"'The integers can be partitioned' is ambiguous — does not specify the set.",verbatim:"The phrase \"the integers can be partitioned\" is ambiguous and does not specify the set being partitioned, which is required for clarity. As written, it may refer to an infinite collection, making the task infeasible."},
  {n:2,reviewer:'Reviewer A',result:'NR',date:'Apr 29',summary:"Definition of 'balanced' is ill-posed — partitioning into infinitely many n-tuples is undefined.",verbatim:"The definition of balanced in this context is ill-posed. The definition requires we partition the complete set of integers into infinitely many n-tuples, so n→∞, but this further complicates matters as ∞ is not a number, so it cannot be a positive integer. There are no restrictions on how tuples are formed, creating an ambiguous situation."},
  {n:3,reviewer:'Reviewer B',result:'NR',date:'Apr 29',summary:"Step 4 contradicts Step 3. Set brackets must be typeset as \\{...\\} not {...}.",verbatim:"Solution: Step 4 seems to contradict Step 3. Step 3 partitions all positive integers into groups of m, and Step 4 talks about an unused group of m-1 and an unused pair. I suggest you introduce a step explaining exactly how you are partitioning the positive integers. Formatting: Please note that set brackets must be typeset in LaTeX as \\{...\\}, and not simply {...}."},
  {n:4,reviewer:'(unknown)',result:'',date:'Apr 30',summary:'',verbatim:''},
  {n:5,reviewer:'Reviewer C',result:'NR',date:'Apr 30',summary:"Claim that even n is balanced when 4|n is not justified — 14 should be included.",verbatim:"The solution is mostly correct, please revise the following issues: In the question the correct LaTeX format of writing S={2,5,9,...} is S=\\{2,5,9,...\\}. In step 1 you said for n=2, a tuple (x,y) has cyclic sum x²y+y²x=xy(x+y). So each valid pair must either contain 0 or be of the form (m,-m). Since 0 can appear only once in the bijection, if we use the pair (0,1), then -1 is left over. Therefore n=2 is not balanced. So the statement \"every even element of S is balanced\" is not correct."},
  {n:6,reviewer:'Reviewer A',result:'NR',date:'May 01',summary:"LaTeX set brackets {} still wrong — cannot change your prompt for you.",verbatim:"I need to send this back because the prompt is still incorrect. You still need to update everyplace where you are using {} for a set. In LaTeX this will not render correctly, thereby causing issues with the model. I cannot change your prompt for you. You need to change this."},
  {n:7,reviewer:'Reviewer D',result:'NR',date:'May 01',summary:"Claim about 4|n not justified. Also missing Final Answer: \\boxed{...} format.",verbatim:"You claim that an even integer n is balanced exactly when 4|n, but this is not justified, for example 14 should be included. Your proof also has gaps: the claimed modulo 4 obstruction in Step 3 is not established, and the construction involving the unique integer 0 in Step 5 is asserted without a valid partition argument. The final step of the problem must use LaTeX box format to denote the answer and end with \"Final Answer: $\\boxed{<answer goes here>}$\""},
  {n:8,reviewer:'Reviewer E',result:'',date:'May 01',summary:'',verbatim:''},
  {n:9,reviewer:'Reviewer C',result:'',date:'May 01',summary:'',verbatim:''},
  {n:10,reviewer:'Reviewer G',result:'NR',date:'May 02',summary:"Mod 4 argument gap. Step 5 gap — constructing tuple with 0 not justified.",verbatim:"Thanks for the submission. The prompt itself looks fine. The issue is in the solution. The main problem is Step 3. It claims that no n ≡ 2 (mod 4) can be balanced, but the mod 4 argument does not actually prove that. It only gives a parity restriction, and that is not enough to force the tuple entries into opposite pairs or rule out other kinds of cancellation. There is also a gap in Step 5. It says that 0 can be put into one exceptional valid tuple, but that is exactly the part that needs to be shown."},

  {n:12,reviewer:'Reviewer F',result:'NR',date:'May 05',summary:"Math correct (Smith normal form diag(2,4,4,0)) but LaTeX row breaks need \\\\. Domain explanation wrong — this is Abstract Algebra not Number Theory.",verbatim:"thank you for your hard work. The final mathematical answer is correct. The Smith normal form is diag(2,4,4,0), so the group is Z ⊕ Z/2Z ⊕ Z/4Z ⊕ Z/4Z. But this still needs revision. The matrix in the prompt has a LaTeX rendering issue. The row breaks should use `\\\\`, otherwise the matrix does not preview correctly. The domain explanation also does not match the problem. It talks about Number Theory, integer powers, cyclic sums, and parity. This problem is about Smith normal form and finitely generated modules over Z, so the explanation should support Abstract Algebra / Module theory."},

{id:'cs005',caseId:'CS-005',title:'Formatting NRs Stalled Valid Submission',project:'Main',nrCount:9,totalReviews:10,uniqueReviewers:6,daysInFlight:25,flags:['Multi-Reviewer','Contradictory Feedback'],

  prompt:"A fair six-sided die is rolled repeatedly. The game ends as soon as a $6$ is rolled. You receive a payout of $2^{n}$ dollars, where $n$ is the total number of rolls made (including the final roll that resulted in a $6$). However, the maximum payout is capped at $100$ dollars. Find the expected value of the payout in dollars.",
  domain:"Probability and Statistics — Random variables and distributions",

  steps:["Step 1: The number of rolls $n$ follows a geometric distribution with $p=1/6$. $P(n)=(5/6)^{n-1}\\cdot(1/6)$.","Step 2: Payout threshold: $2^6=64 < 100 < 128=2^7$. So payout is $2^n$ for $n\\le 6$, capped at $100$ for $n\\ge 7$.","Step 3: $E_1 = \\sum_{n=1}^{6} 2^n \\cdot (5/6)^{n-1} \\cdot (1/6) = (1/3)\\sum_{n=1}^{6}(5/3)^{n-1} = \\frac{7448}{729}$.","Step 4: $P(n\\ge 7)=(5/6)^6=\\frac{15625}{46656}$. $E_2=100\\cdot\\frac{15625}{46656}=\\frac{390625}{11664}$.","Step 5: $E = E_1+E_2 = \\frac{119168}{11664}+\\frac{390625}{11664}=\\frac{509793}{11664}=\\frac{169931}{3888}$. Final Answer: $\\boxed{\\frac{169931}{3888}}$."]

const state={filter:'all',open:null,subVisible:{},verbatimVisible:{},data:{}};

function loadState(){try{const s=localStorage.getItem('rotura_q2');if(s)Object.assign(state.data,JSON.parse(s));}catch(e){}}
function saveState(){try{localStorage.setItem('rotura_q2',JSON.stringify(state.data));}catch(e){}}
function getCD(id){return state.data[id]||{};}
function setCD(id,p){state.data[id]={...getCD(id),...p};saveState();}
function getStatus(id){return getCD(id).status||'Unreviewed';}

function flagTag(f){
  const m={'Excessive Rounds':'red','Multi-Reviewer':'blue','Long In-Flight':'orange','Contradictory Feedback':'yellow','Repeated Same NR':'purple'};
  return `<span class="tag tag-${m[f]||'gray'}">${f}</span>`;
}
function stClass(s){return s==='In Review'?'st-inreview':s==='Complete'?'st-complete':'st-unreviewed';}
function rClass(r){return r==='NR'?'r-nr':r==='ACCEPT'?'r-accept':r==='REJECT'?'r-reject':'r-blank';}

function renderStats(){
  const u=CASES.filter(c=>getStatus(c.id)==='Unreviewed').length;
  const i=CASES.filter(c=>getStatus(c.id)==='In Review').length;
  const d=CASES.filter(c=>getStatus(c.id)==='Complete').length;
  document.getElementById('stats').innerHTML=[
    ['Total Cases',CASES.length,''],
    ['Unreviewed',u,'color:var(--red-text)'],
    ['In Review',i,'color:var(--yellow-text)'],
    ['Complete',d,'color:var(--green-text)'],
  ].map(([l,v,s])=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value" style="${s}">${v}</div></div>`).join('');
}

function renderSubmission(c){
  if(!c.submission) return `<div class="unavailable">Submission content unavailable — data not persisted in platform for this case.</div>`;
  const s=c.submission;
  const visible=state.subVisible[c.id];
  const steps=JSON.parse(s.steps||'[]').catch?s.steps:(() => {try{return JSON.parse(s.steps);}catch{return s.steps||[];}})();
  const stepsArr=Array.isArray(steps)?steps:(typeof steps==='string'?[steps]:[]);
  return `
    <div class="submission-toggle" onclick="toggleSub('${c.id}')">
      <span>&#9654; View submission content (problem, solution, domain)</span>
      <span style="font-size:11px;color:var(--text3)">${visible?'collapse':'expand'}</span>
    </div>
    <div class="submission-content${visible?' visible':''}">
      <div class="sub-field"><div class="sub-field-label">Domain &amp; Sub-domain</div><div class="sub-field-value short">${s.domain||'—'}</div></div>
      <div class="sub-field"><div class="sub-field-label">Problem type / Answer type</div><div class="sub-field-value short">${s.problemType||'—'} / ${s.answerType||'—'}</div></div>
      <div class="sub-field"><div class="sub-field-label">Math problem (prompt)</div><div class="sub-field-value">${s.prompt||'—'}</div></div>
      <div class="sub-field"><div class="sub-field-label">Final answer</div><div class="sub-field-value">${s.finalAnswer||'—'}</div></div>
      <div class="sub-field"><div class="sub-field-label">Domain explanation</div><div class="sub-field-value short">${s.domainExplanation||'—'}</div></div>
      <div class="sub-field">
        <div class="sub-field-label">Step-by-step solution (${stepsArr.length} steps)</div>
        <ul class="steps-list">${stepsArr.map((st,i)=>`<li class="step-item"><strong>Step ${i+1}:</strong> ${st}</li>`).join('')}</ul>
      </div>
    </div>`;
}

function renderTimeline(c){
  return c.timeline.map(r=>`<div class="tl-row">
    <div class="tl-num ${rClass(r.result)}">${r.n}</div>
    <div class="tl-content">
      <div class="tl-meta">
        <span class="tl-reviewer">${r.reviewer}</span>
        <span class="tl-date">${r.date}</span>
        ${r.result?`<span class="tag tag-${r.result==='NR'?'red':r.result==='ACCEPT'?'gray':'orange'}" style="font-size:10px">${r.result}</span>`:''}
      </div>
      ${r.summary?`<div class="tl-summary">${r.summary}</div>
        <button class="tl-verbatim-toggle" onclick="toggleVerbatim('${c.id}-${r.n}')">
          ${state.verbatimVisible[c.id+'-'+r.n]?'hide full note':'show full note'}
        </button>
        <div class="tl-verbatim${state.verbatimVisible[c.id+'-'+r.n]?' visible':''}">${r.verbatim}</div>`
      :`<div class="tl-empty">No revision note recorded.</div>`}
    </div>
  </div>`).join('');
}

function renderBody(c){
  const cd=getCD(c.id);
  const dt=cd.diagTags||[];
  return `<div class="card-body">
    <div class="section">
      <div class="section-title">Original author</div>
      <div style="font-size:13px;color:var(--text2)">Original Author (identity available internally)</div>
    </div>
    <div class="section">
      <div class="section-title">Submission content</div>
      ${renderSubmission(c)}
    </div>
    <div class="section">
      <div class="section-title">Review history &mdash; ${c.nrCount} NRs across ${c.totalReviews} rounds</div>
      <div class="timeline">${renderTimeline(c)}</div>
    </div>
    <div class="section">
      <div class="section-title">Diagnosis</div>
      <div class="assign-row">
        <label>Assigned to:</label>
        <select onchange="setCD('${c.id}',{assignee:this.value})">
          <option value="">&#8212; Unassigned &#8212;</option>
          ${W2_ECS.map(e=>`<option value="${e}"${cd.assignee===e?' selected':''}>${e}</option>`).join('')}
        </select>
      </div>
      <div class="diag-grid">${DIAG_OPTS.map(o=>`<span class="diag-chip${dt.includes(o)?' on':''}" onclick="toggleDiag('${c.id}','${o}')">${o}</span>`).join('')}</div>
      <div class="field">
        <label>Additional notes</label>
        <textarea placeholder="Describe root cause, reviewer gaps, submitter pattern..." onchange="setCD('${c.id}',{diagNotes:this.value})">${cd.diagNotes||''}</textarea>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Coaching messages</div>
      <div class="field">
        <label>Reviewer coaching note &mdash; reviewers in this case are anonymized above. See internal Notion key for emails.</label>
        <textarea placeholder="Specific, actionable message for reviewer(s). What should they do differently?" onchange="setCD('${c.id}',{reviewerNote:this.value})">${cd.reviewerNote||''}</textarea>
      </div>
      <div class="field">
        <label>Original Author coaching note</label>
        <textarea placeholder="Message for the original author. What can they fix going forward?" onchange="setCD('${c.id}',{submitterNote:this.value})">${cd.submitterNote||''}</textarea>
      </div>
    </div>
    <div class="section">
      <div class="actions">
        ${cd.savedAt?`<span class="save-msg">&#10003; Saved ${cd.savedAt}</span>`:''}
        <select onchange="updateStatus('${c.id}',this.value)" style="font-size:12px;padding:6px 10px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text)">
          <option${getStatus(c.id)==='Unreviewed'?' selected':''}>Unreviewed</option>
          <option${getStatus(c.id)==='In Review'?' selected':''}>In Review</option>
          <option${getStatus(c.id)==='Complete'?' selected':''}>Complete</option>
        </select>
        <button class="btn btn-blue" onclick="copyNotes('${c.id}')">&#8663; Copy coaching notes</button>
        <button class="btn btn-green" onclick="markComplete('${c.id}')">&#10003; Save &amp; complete</button>
      </div>
    </div>
  </div>`;
}

function renderQueue(){
  const f=CASES.filter(c=>state.filter==='all'||getStatus(c.id)===state.filter);
  if(!f.length){document.getElementById('queue').innerHTML='<div class="empty">No cases in this view.</div>';return;}
  document.getElementById('queue').innerHTML=f.map(c=>{
    const isOpen=state.open===c.id;
    const st=getStatus(c.id);
    return `<div class="card${isOpen?' open':''}" id="card-${c.id}">
      <div class="card-header" onclick="toggleCard('${c.id}')">
        <span class="card-num">${c.caseId}</span>
        <div class="card-main">
          <div class="card-title">${c.title}</div>
          <div class="card-tags">${c.flags.map(flagTag).join('')}<span class="tag tag-${c.project==='Frontier'?'purple':'blue'}">${c.project}</span></div>
          <div class="card-meta"><span>${c.nrCount} NRs / ${c.totalReviews} reviews</span><span>${c.uniqueReviewers} reviewers</span><span>${c.daysInFlight}d in flight</span></div>
        </div>
        <div class="card-right">
          <span class="status-badge ${stClass(st)}">${st}</span>
          <span class="chevron">${isOpen?'&#9650;':'&#9660;'}</span>
        </div>
      </div>
      ${isOpen?renderBody(c):''}
    </div>`;
  }).join('');
}

window.toggleCard=function(id){
  state.open=state.open===id?null:id;
  if(state.open&&getStatus(id)==='Unreviewed')setCD(id,{status:'In Review'});
  render();
  if(state.open)setTimeout(()=>{const el=document.getElementById('card-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);
};
window.setFilter=function(f){
  state.filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
  renderQueue();renderStats();
};
window.toggleSub=function(id){
  state.subVisible[id]=!state.subVisible[id];
  const btn=document.querySelector(`#card-${id} .submission-toggle span:last-child`);
  const content=document.querySelector(`#card-${id} .submission-content`);
  if(btn)btn.textContent=state.subVisible[id]?'collapse':'expand';
  if(content)content.classList.toggle('visible',state.subVisible[id]);
};
window.toggleVerbatim=function(key){
  state.verbatimVisible[key]=!state.verbatimVisible[key];
  const btn=document.querySelector(`[onclick="toggleVerbatim('${key}')"]`);
  const box=btn?.nextElementSibling;
  const cid=key.split('-').slice(0,2).join('-'); // handles cs00X-N
  if(btn)btn.textContent=state.verbatimVisible[key]?'hide full note':'show full note';
  if(box)box.classList.toggle('visible',state.verbatimVisible[key]);
};
window.updateStatus=function(id,v){setCD(id,{status:v});renderStats();};
window.toggleDiag=function(id,opt){
  const t=[...(getCD(id).diagTags||[])];
  const i=t.indexOf(opt);if(i>=0)t.splice(i,1);else t.push(opt);
  setCD(id,{diagTags:t});
  document.querySelectorAll(`#card-${id} .diag-chip`).forEach(ch=>ch.classList.toggle('on',t.includes(ch.textContent)));
};
window.copyNotes=function(id){
  const cd=getCD(id);const c=CASES.find(x=>x.id===id);
  const txt=`=== REVIEWER COACHING NOTE (${c.caseId}) ===\n${cd.reviewerNote||'(not drafted)'}\n\n=== ORIGINAL AUTHOR COACHING NOTE (${c.caseId}) ===\n${cd.submitterNote||'(not drafted)'}`;
  navigator.clipboard.writeText(txt).catch(()=>{});
};
window.markComplete=function(id){
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  setCD(id,{status:'Complete',savedAt:now});
  renderStats();renderQueue();
};
window.setCD=setCD;

function render(){renderStats();renderQueue();}
loadState();render();
</script>
</body>
</html>
